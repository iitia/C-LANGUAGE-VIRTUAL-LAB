<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Even Odd Detector - Virtual C Lab</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
}

.card{
    width:500px;
    padding:35px;
    border-radius:25px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    box-shadow:0 0 40px rgba(0,255,255,.2);
    text-align:center;
    color:white;
}

h1{
    color:#38bdf8;
    margin-bottom:10px;
}

.subtitle{
    color:#cbd5e1;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    text-align:center;
    margin-bottom:20px;
}

button{
    padding:14px 30px;
    border:none;
    border-radius:12px;
    background:#06b6d4;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.number-box{
    margin-top:30px;
    height:120px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.circle{
    width:100px;
    height:100px;
    border-radius:50%;
    background:#334155;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    font-weight:bold;
    transition:.5s;
}

.even{
    background:#22c55e;
    box-shadow:0 0 25px #22c55e;
}

.odd{
    background:#ef4444;
    box-shadow:0 0 25px #ef4444;
}

.result{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
}

.steps{
    margin-top:20px;
    text-align:left;
    background:rgba(255,255,255,.05);
    padding:15px;
    border-radius:12px;
}

.code{
    margin-top:20px;
    background:#020617;
    color:#22c55e;
    padding:15px;
    border-radius:12px;
    text-align:left;
    font-family:monospace;
}
</style>
</head>
<body>

<div class="card">

    <h1>⚡ Even/Odd Detector</h1>
    <p class="subtitle">Virtual C Programming Lab</p>

    <input type="number" id="num" placeholder="Enter a Number">

    <button onclick="checkNumber()">Analyze Number</button>

    <div class="number-box">
        <div class="circle" id="circle">?</div>
    </div>

    <div class="result" id="result">
        Waiting for input...
    </div>

    <div class="steps" id="steps">
        Enter a number and click Analyze.
    </div>

    <div class="code">
if(num % 2 == 0)<br>
&nbsp;&nbsp;printf("Even");<br>
else<br>
&nbsp;&nbsp;printf("Odd");
    </div>

</div>

<script>

function checkNumber(){

    let num = parseInt(document.getElementById("num").value);

    if(isNaN(num)){
        alert("Please enter a valid number");
        return;
    }

    let circle = document.getElementById("circle");
    let result = document.getElementById("result");
    let steps = document.getElementById("steps");

    if(num % 2 === 0){

        circle.className="circle even";
        circle.innerHTML=num;

        result.innerHTML="✅ EVEN NUMBER";

        steps.innerHTML=
        `
        Step 1: Number entered = ${num}<br>
        Step 2: Calculate ${num} % 2<br>
        Step 3: Remainder = 0<br>
        Step 4: Number is EVEN
        `;
    }
    else{

        circle.className="circle odd";
        circle.innerHTML=num;

        result.innerHTML="🔥 ODD NUMBER";

        steps.innerHTML=
        `
        Step 1: Number entered = ${num}<br>
        Step 2: Calculate ${num} % 2<br>
        Step 3: Remainder ≠ 0<br>
        Step 4: Number is ODD
        `;
    }
}
</script>

</body>
</html>
